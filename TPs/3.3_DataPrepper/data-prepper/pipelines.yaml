# data-prepper/pipelines.yaml
# Exemple : pipeline OTLP -> OpenSearch
otel-trace-pipeline:
  source:
    otel_trace_source:
      port: 21890
      # ssl: false  # décommenter si tu veux désactiver TLS
  processor:
    - otel_trace_raw:
  sink:
    - opensearch:
        hosts:
          - "http://opensearch-node1:9200"
          - "http://opensearch-node2:9200"
          - "http://opensearch-node3:9200"
        insecure: true
        index_type: trace-analytics-raw

otel-log-pipeline:
  source:
    otel_logs_source:
      port: 21892
  sink:
    - opensearch:
        hosts:
          - "http://opensearch-node1:9200"
          - "http://opensearch-node2:9200"
          - "http://opensearch-node3:9200"
        insecure: true
        index: logs-%{yyyy.MM.dd}
